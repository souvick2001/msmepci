<div class="contact-container">
  <div class="contact-card">
    <h2>Contact Us</h2>
    <p>We'd love to hear from you!</p>

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="fullName" placeholder="Enter your name">
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" formControlName="email" placeholder="email@example.com">
      </div>

      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" formControlName="phone">
        <small *ngIf="contactForm.get('phone')?.invalid && contactForm.get('phone')?.touched">
          Please enter a valid number.
        </small>
      </div>

      <div class="form-group">
        <label>Message (Max 1000 chars)</label>
        <textarea formControlName="message" rows="5" placeholder="Type your message here..."></textarea>
        <div class="char-count">
          {{ contactForm.get('message')?.value?.length || 0 }} / 1000
        </div>
      </div>

      <button type="submit" [disabled]="contactForm.invalid">Send Message</button>
    </form>
  </div>
</div>
