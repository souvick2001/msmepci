<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="nav-container">
    <a class="logo" routerLink="/">
      <span class="logo-icon">🏭</span>
      <span class="logo-text">MSME<strong>PCI</strong></span>
    </a>

    <ul class="nav-links" [class.open]="menuOpen()">
      <li><a routerLink="/"           routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMenu()">Home</a></li>
      <li><a routerLink="/about"      routerLinkActive="active" (click)="closeMenu()">About</a></li>
      <li><a routerLink="/activities" routerLinkActive="active" (click)="closeMenu()">Activities</a></li>
      <li><a routerLink="/gallery"    routerLinkActive="active" (click)="closeMenu()">Gallery</a></li>
      <li><a routerLink="/contact"    routerLinkActive="active" (click)="closeMenu()">Contact</a></li>
    </ul>

    <div class="nav-auth">
      @if (auth.isLoggedIn()) {
        <span class="user-name">👤 {{ auth.currentUser()?.name }}</span>
        <button class="btn-logout" (click)="auth.logout()">Logout</button>
      } @else {
        <a routerLink="/auth" [queryParams]="{mode:'login'}"    class="btn-login">Login</a>
        <a routerLink="/auth" [queryParams]="{mode:'register'}" class="btn-register">Sign Up</a>
      }
    </div>

    <button class="hamburger" (click)="toggleMenu()" [class.open]="menuOpen()">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
